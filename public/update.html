<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cập nhật</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="header">Home | Đăng xuất</div>

    <div class="container">
        <h2>Màn hình cập nhật</h2>

        <form id="updateForm">
            <label>Username</label>
            <input type="text" id="updateUsername" value="user1">

            <label>Mật khẩu</label>
            <input type="password" id="updatePassword" value="123456">

            <label>Nhập lại mật khẩu</label>
            <input type="password" id="updateRePassword" value="123456">

            <label>Email</label>
            <input type="email" id="updateEmail" value="user@gmail.com">

            <br>
            <button type="submit">Cập nhật</button>
        </form>
    </div>

    <div class="footer">Lập trình web 2024</div>

    <script src="js/main.js"></script>
</body>
</html>
